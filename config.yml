# Source Code Rain — default configuration
#
# Run with:  rust-digital-rain --config config.yml
#
# To add private directory paths, create config.secret.yml in this same
# directory (it is gitignored). See README for format details.

# ---------------------------------------------------------------------------
# File extension filter — applies to all path entries below
# ---------------------------------------------------------------------------
extensions:
  - rs
  - py
  - js
  - mjs
  - ts
  - mts
  - java
  - kt
  - cs
  - fs
  - fsx
  - hs
  - swift
  - clj
  - cljs
  - php
  - cob
  - cbl
  - vb
  - sql
  - cpp
  - cxx
  - cc
  - hpp
  - c
  - h
  - rb
  - dart
  - r
  - go

# ---------------------------------------------------------------------------
# Directory paths to scan for source files
# ---------------------------------------------------------------------------
paths:
  - path: ./src
    highlight_keywords: true
    highlight_numbers: true

# ---------------------------------------------------------------------------
# Doc-comment line prefixes per language.
# Lines whose trimmed content starts with any of these prefixes are skipped.
# Multiple prefixes are comma-separated.
# Language keys must match the extension-to-language map in source.rs.
# ---------------------------------------------------------------------------
doc_comments:
  rust:         "///, //, //!"
  java:         "/**, * , */"
  kotlin:       "/**, * , */"
  javascript:   "/**, * , */"
  typescript:   "/**, * , */"
  csharp:       "///, /**, * , */"
  fsharp:       "///"
  haskell:      "-- |, -- ^, -- $, {-|"
  swift:        "///, /**"
  php:          "/**, * , */"
  python:       "\"\"\", '''"
  ruby:         "##"
  dart:         "///, /**"
  r:            "#'"
  sql:          "--"
  cpp:          "///, /**, * , */"
  c:            "/**, * , */"
  visualbasic:  "'''"
  go:           "//"

# ---------------------------------------------------------------------------
# Keyword lists per language — used when highlight_keywords is true.
# Multiple keywords are comma-separated on a single line.
# Language keys must match the extension-to-language map in source.rs.
# ---------------------------------------------------------------------------
keywords:
  rust:         "fn, pub, pub(crate), async, await, let, mut, const, static, struct, enum, impl, trait, type, where, use, mod, crate, super, self, return, if, else, match, for, while, loop, break, continue, move, ref, dyn, box, unsafe, extern, in, as"
  python:       "def, class, import, from, return, if, elif, else, for, while, with, as, try, except, finally, raise, yield, lambda, pass, break, continue, global, nonlocal, and, or, not, in, is, del, assert, async, await"
  javascript:   "function, const, let, var, return, if, else, for, while, do, switch, case, break, continue, class, extends, new, this, super, import, export, default, from, async, await, try, catch, finally, throw, typeof, instanceof, in, of, delete, void, yield"
  typescript:   "function, const, let, var, return, if, else, for, while, do, switch, case, break, continue, class, extends, implements, interface, type, enum, namespace, module, new, this, super, import, export, default, from, async, await, try, catch, finally, throw, typeof, instanceof, in, of, delete, void, yield, abstract, readonly, public, private, protected, static, declare, as, keyof, never, unknown"
  java:         "public, private, protected, static, final, abstract, class, interface, enum, extends, implements, new, this, super, return, if, else, for, while, do, switch, case, break, continue, try, catch, finally, throw, throws, import, package, void, null, true, false, instanceof, synchronized, volatile, transient, native, strictfp, assert, default, var"
  kotlin:       "fun, val, var, class, interface, object, companion, data, sealed, enum, abstract, open, override, final, private, protected, public, internal, return, if, else, when, for, while, do, break, continue, try, catch, finally, throw, import, package, null, true, false, in, is, as, by, init, constructor, lateinit, suspend, inline, reified, typealias"
  csharp:       "public, private, protected, internal, static, readonly, const, abstract, virtual, override, sealed, class, struct, interface, enum, delegate, namespace, using, new, this, base, return, if, else, for, foreach, while, do, switch, case, break, continue, try, catch, finally, throw, null, true, false, in, is, as, out, ref, params, void, var, dynamic, async, await, yield, partial, extern, checked, unchecked, unsafe, fixed, lock"
  fsharp:       "let, rec, in, fun, function, match, with, when, if, then, else, elif, for, while, do, return, yield, type, and, or, not, true, false, null, open, module, namespace, begin, end, try, finally, raise, failwith, member, override, interface, abstract, static, mutable, inline, inherit, new, upcast, downcast, as, of, val, sig, struct, class, enum"
  haskell:      "let, in, where, do, if, then, else, case, of, data, type, newtype, class, instance, deriving, import, module, qualified, as, hiding, forall, return, pure, fmap"
  swift:        "func, var, let, class, struct, enum, protocol, extension, init, deinit, self, super, return, if, else, guard, switch, case, for, while, repeat, break, continue, fallthrough, do, try, catch, throw, throws, rethrows, import, typealias, associatedtype, inout, mutating, nonmutating, static, final, override, open, public, internal, fileprivate, private, weak, unowned, lazy, optional, nil, true, false, as, is, in, where, some, any, async, await, actor"
  clojure:      "defn, defn-, def, let, loop, recur, if, if-not, when, when-not, cond, case, do, fn, and, or, not, ns, require, use, import, refer, map, filter, reduce, apply, for, doseq, dotimes, try, catch, finally, throw, nil, true, false"
  php:          "function, class, interface, trait, abstract, extends, implements, public, private, protected, static, final, return, if, else, elseif, for, foreach, while, do, switch, case, break, continue, try, catch, finally, throw, new, echo, print, include, require, use, namespace, null, true, false, match, fn"
  cobol:        "identification, division, program-id, environment, data, procedure, working-storage, section, perform, move, display, accept, compute, add, subtract, multiply, divide, if, else, end-if, evaluate, when, end-evaluate, stop, run, call, goback, exit, paragraph, until, varying"
  visualbasic:  "dim, as, function, sub, end, return, if, then, else, elseif, for, each, next, while, wend, do, loop, select, case, class, module, namespace, imports, public, private, protected, friend, shared, readonly, const, new, me, mybase, myclass, nothing, true, false, try, catch, finally, throw, handles, implements, interface, inherits, overrides, overridable, mustoverride, notoverridable, property, get, set, event, delegate, with, of, in, is, not, and, or, xor, like, mod, byval, byref, optional, paramarray, async, await, yield"
  sql:          "select, from, where, join, inner, outer, left, right, full, cross, on, as, group, by, order, having, limit, offset, union, intersect, except, insert, into, values, update, set, delete, create, table, view, index, drop, alter, add, column, constraint, primary, key, foreign, references, unique, not, null, default, check, and, or, in, like, between, is, exists, distinct, all, any, case, when, then, else, end, begin, commit, rollback, transaction, with, recursive"
  cpp:          "auto, bool, break, case, catch, char, class, const, constexpr, continue, default, delete, do, double, else, enum, explicit, extern, false, final, float, for, friend, if, inline, int, long, mutable, namespace, new, noexcept, nullptr, operator, override, private, protected, public, return, short, sizeof, static, static_assert, static_cast, struct, switch, template, this, throw, true, try, typedef, typename, union, using, virtual, void, volatile, while"
  c:            "auto, break, case, char, const, continue, default, do, double, else, enum, extern, float, for, goto, if, inline, int, long, register, restrict, return, short, signed, sizeof, static, struct, switch, typedef, union, unsigned, void, volatile, while, null, true, false"
  ruby:         "def, end, class, module, do, if, unless, else, elsif, then, case, when, while, until, for, in, begin, rescue, ensure, retry, raise, return, yield, next, break, self, super, nil, true, false, and, or, not, include, extend, require, require_relative, attr_accessor, attr_reader, attr_writer, public, private, protected, lambda, proc"
  dart:         "abstract, as, assert, async, await, break, case, catch, class, const, continue, covariant, default, deferred, do, dynamic, else, enum, export, extends, extension, external, factory, false, final, finally, for, function, get, hide, if, implements, import, in, interface, is, late, library, mixin, new, null, on, operator, part, required, rethrow, return, sealed, set, show, static, super, switch, sync, this, throw, true, try, typedef, var, void, when, with, yield"
  r:            "function, if, else, for, while, repeat, break, next, return, in, library, require, source, TRUE, FALSE, NULL, NA, Inf, NaN, local, stop, warning, message, tryCatch, withCallingHandlers, on.exit"
  go:           "break, case, chan, const, continue, default, defer, else, fallthrough, for, func, go, goto, if, import, interface, map, package, range, return, select, struct, switch, type, var, nil, true, false, error, any, string, int, int8, int16, int32, int64, uint, uint8, uint16, uint32, uint64, uintptr, byte, rune, float32, float64, complex64, complex128, bool, make, new, len, cap, close, delete, copy, append, panic, recover, print, println"
